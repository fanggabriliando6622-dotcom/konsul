[phases.setup]
nixPkgs = [
    'php84',
    'php84Packages.composer',
    'php84Extensions.pdo',
    'php84Extensions.pdo_mysql',
    'php84Extensions.mysqli',
    'nginx',
    'nodejs_20'
]

[phases.install]
cmds = [
    'composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader'
]

[start]
cmd = 'php -r "var_dump(extension_loaded(\"pdo_mysql\"));" && php artisan serve --host=0.0.0.0 --port=$PORT'